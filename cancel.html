<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Sandy Hair</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .cancel-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .cancel-icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #e91e63; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 10px; }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #e91e63;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn-outline {
            background: white;
            color: #e91e63;
            border: 2px solid #e91e63;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon">❌</div>
        <h1>Payment Cancelled</h1>
        <p>Your payment was not completed.</p>
        <p>Your cart items are still saved. You can try again or contact us for assistance.</p>
        <a href="checkout.html" class="btn">Try Again</a>
        <a href="index.html" class="btn btn-outline">Back to Shop</a>
    </div>
</body>
</html>
