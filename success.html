<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Sandy Hair</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 { color: #2e7d32; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 10px; }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #e91e63;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your order at Sandy Hair.</p>
        <p>Your order is being processed. We will send you tracking details once your package is dispatched.</p>
        <p>Expected delivery: <strong>4-7 working days</strong> via Paxi</p>
        <a href="index.html" class="btn">Continue Shopping</a>
    </div>
</body>
</html>
